<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINH PHU – iHRP Lương Sản Phẩm & Năng Suất</title>
  <link rel="stylesheet" href="shared/style.css">
  <script src="nav-config.js"></script>
  <script src="shared/utils.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 280px; flex-shrink: 0; background: #1f2a44; color: #fff; overflow-y: auto; transition: background-color 0.3s; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #main-frame { flex: 1; width: 100%; border: none; background: #fff; }
    .brand { padding: 16px 18px; font-size: 18px; font-weight: bold; background: #d32f2f; display: flex; align-items: center; gap: 8px; }
    .brand small { display:block; font-weight: normal; font-size: 11px; opacity: .9; }
    .topbar { background: #ffd600; color: #5a4b00; padding: 10px 18px; font-weight: bold; font-size: 14px; display:flex; justify-content: space-between; align-items:center; }
    .topbar .hint { font-weight: normal; font-size: 11px; color: #7a6700; }
    
    .nav-group { padding: 10px 0 4px; }
    .nav-group .grp-title { padding: 8px 18px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #9fb0d0; }
    .nav-item { padding: 10px 18px 10px 26px; cursor: pointer; font-size: 13px; border-left: 4px solid transparent; display: flex; gap: 8px; }
    .nav-item:hover { background: rgba(0,0,0,0.1); }
    .nav-item.active { border-left-color: #ffd600; font-weight: bold; background-color: rgba(255,214,0,0.15); }
    .nav-item .idx { color: #ffd600; font-weight: bold; width: 18px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="brand"><span style="font-size:22px;">&#10086;</span> <span>MINH PHU<small>Lương Sản Phẩm - Demo</small></span></div>
      <div id="nav-container"></div>
    </div>
    <div class="main">
      <div class="topbar" id="topbar">
        <span id="pg-title">...</span>
        <div>
          <span class="hint">Demo Prototype – Thẩm định nghiệp vụ</span>
          <button onclick="document.getElementById('main-frame').contentWindow.print()" style="background:#6c757d;color:#fff;border:none;padding:4px 12px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:bold;margin-left:10px;">🖨 In màn hình</button>
        </div>
      </div>
      <iframe id="main-frame" title="content"></iframe>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const navContainer = document.getElementById('nav-container');
      const mainFrame = document.getElementById('main-frame');
      const pgTitle = document.getElementById('pg-title');
      
      let navHtml = '';
      let itemIndex = 1;
      let allItems = {};
      
      window.NAV_CONFIG.groups.forEach(group => {
        navHtml += `<div class="nav-group"><div class="grp-title">${group.title}</div>`;
        group.items.forEach(item => {
           const isLNS = group.title.includes('LNS');
           const prefix = isLNS ? '›' : itemIndex++;
           navHtml += `<div class="nav-item" data-id="${item.id}" data-src="${item.src}" data-title="${item.label}" data-lns="${isLNS}"><span class="idx">${prefix}</span> ${item.label}</div>`;
           allItems[item.id] = item;
        });
        navHtml += `</div>`;
      });
      navContainer.innerHTML = navHtml;
      
      const navItems = document.querySelectorAll('.nav-item');
      
      function loadPage(id) {
         const itemEl = document.querySelector(`.nav-item[data-id="${id}"]`);
         if (!itemEl) return;
         
         navItems.forEach(el => el.classList.remove('active'));
         itemEl.classList.add('active');
         
         const srcUrl = itemEl.getAttribute('data-src');
         const src = srcUrl + (srcUrl.includes('?') ? '&v=' : '?v=') + new Date().getTime();
         const title = itemEl.getAttribute('data-title');
         const isLNS = itemEl.getAttribute('data-lns') === 'true';
         
         mainFrame.src = src;
         pgTitle.textContent = title;
         
         const sidebar = document.getElementById('sidebar');
         if (isLNS) {
             sidebar.style.backgroundColor = '#1e3a5f';
         } else {
             sidebar.style.backgroundColor = '#1f2a44';
         }
         
         sessionStorage.setItem('lastPageId', id);
      }
      
      navItems.forEach(item => {
         item.addEventListener('click', function() {
             loadPage(this.getAttribute('data-id'));
         });
      });
      
      const lastPageId = sessionStorage.getItem('lastPageId');
      if (lastPageId && allItems[lastPageId]) {
         loadPage(lastPageId);
      } else if (window.NAV_CONFIG.groups[0] && window.NAV_CONFIG.groups[0].items[0]) {
         loadPage(window.NAV_CONFIG.groups[0].items[0].id);
      }
    });
  </script>
</body>
</html>
